name: deploy

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event != 'pull_request')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: |
            services/identity/go.sum
            services/content/go.sum
            services/interview/go.sum
            services/ai/go.sum

      - uses: bufbuild/buf-setup-action@v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: "1.47.0"

      - name: Cache protoc plugins
        uses: actions/cache@v4
        with:
          path: deploy/.proto-bin
          key: proto-plugins-v1-${{ runner.os }}-${{ hashFiles('deploy/scripts/install-proto-tools.sh') }}

      - name: Generate protobuf (CI runner — not on VPS)
        working-directory: ${{ github.workspace }}
        run: bash deploy/scripts/gen-all-proto.sh
        env:
          GOPROXY: https://proxy.golang.org,direct

      - name: Pack generated API + SPA inputs
        run: |
          tar czf generated-api.tgz $(find services -type d -path 'services/*/pkg/api' 2>/dev/null | sort -u)

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build SPA (Caddy image uses prebuilt dist)
        run: |
          cd apps/web
          npm ci
          npm run build
        env:
          VITE_API_BASE: /v1

      - name: Upload generated API tarball
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: generated-api.tgz
          target: /opt/project-druzya/
          overwrite: true

      - name: Upload SPA to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: "apps/web/dist/*"
          target: "/opt/project-druzya/apps/web/dist"
          strip_components: 3
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_GIT_TOKEN: ${{ secrets.DEPLOY_GIT_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: DEPLOY_GIT_TOKEN
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            REPO_DIR="/opt/project-druzya"
            BRANCH="main"
            if [ -n "${{ secrets.DEPLOY_REPO_DIR }}" ]; then REPO_DIR="${{ secrets.DEPLOY_REPO_DIR }}"; fi
            if [ -n "${{ secrets.DEPLOY_BRANCH }}" ]; then BRANCH="${{ secrets.DEPLOY_BRANCH }}"; fi

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Bootstrapping $REPO_DIR ..."
              PARENT="$(dirname "$REPO_DIR")"
              mkdir -p "$PARENT"
              CLONE_URL="https://github.com/${{ github.repository }}.git"
              if [ -n "${DEPLOY_GIT_TOKEN:-}" ]; then
                CLONE_URL="https://x-access-token:${DEPLOY_GIT_TOKEN}@github.com/${{ github.repository }}.git"
              fi
              git clone --branch "$BRANCH" "$CLONE_URL" "$REPO_DIR"
              if [ ! -f "$REPO_DIR/deploy/.env" ]; then
                cp "$REPO_DIR/deploy/.env.example" "$REPO_DIR/deploy/.env"
                echo "ERROR: created deploy/.env from example — fill secrets on the server, then re-run deploy"
                exit 1
              fi
              cd "$REPO_DIR/deploy" && make keys
            fi

            cd "$REPO_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            # Server hotfixes must live in git — discard tracked drift; keep gitignored .env/secrets.
            git reset --hard "origin/$BRANCH"
            git clean -fd --exclude=deploy/.env --exclude=deploy/secrets

            if [ -f generated-api.tgz ]; then
              echo "Extracting pre-generated pkg/api from CI..."
              tar xzf generated-api.tgz
              rm -f generated-api.tgz
            fi

            if [ ! -f deploy/.env ]; then
              echo "ERROR: missing deploy/.env — copy deploy/.env.example and fill secrets"
              exit 1
            fi

            if ! grep -qE '^ADMIN_USER_IDS=.+' deploy/.env || grep -qE '^ADMIN_USER_IDS=(CHANGE_ME|00000000-0000-0000-0000-000000000001)?$' deploy/.env; then
              echo "ERROR: set ADMIN_USER_IDS in deploy/.env (comma-separated identity user UUIDs)"
              exit 1
            fi

            if [ ! -f apps/web/dist/index.html ]; then
              echo "ERROR: missing apps/web/dist — SPA upload step failed"
              exit 1
            fi

            cd deploy
            make keys
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            bash scripts/build-images.sh
            docker compose -f docker-compose.prod.yml --env-file .env run --rm migrate
            if ! docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans --wait --wait-timeout 300; then
              docker compose -f docker-compose.prod.yml --env-file .env ps
              docker compose -f docker-compose.prod.yml --env-file .env logs identity --tail 80
              docker compose -f docker-compose.prod.yml --env-file .env logs billing --tail 40
              docker compose -f docker-compose.prod.yml --env-file .env logs recommendation --tail 40
              docker compose -f docker-compose.prod.yml --env-file .env logs sandbox --tail 40
              exit 1
            fi

            ./scripts/docker-prune.sh

            docker compose -f docker-compose.prod.yml --env-file .env ps

            curl -sf -H "Host: api.druz9.online" "http://127.0.0.1:${CADDY_HTTP_PORT:-18080}/healthz"
            curl -sfI -H "Host: druz9.online" "http://127.0.0.1:${CADDY_HTTP_PORT:-18080}/" | head -1
