name: deploy

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event != 'pull_request')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            REPO_DIR="/opt/project-druzya"
            BRANCH="main"
            if [ -n "${{ secrets.DEPLOY_REPO_DIR }}" ]; then REPO_DIR="${{ secrets.DEPLOY_REPO_DIR }}"; fi
            if [ -n "${{ secrets.DEPLOY_BRANCH }}" ]; then BRANCH="${{ secrets.DEPLOY_BRANCH }}"; fi

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "ERROR: repo not found at $REPO_DIR"
              echo ""
              echo "Run one-time bootstrap ON THE SERVER (SSH in manually):"
              echo "  git clone git@github.com:${{ github.repository }}.git $REPO_DIR"
              echo "  cd $REPO_DIR/deploy && cp .env.example .env && nano .env && make keys && make up"
              echo ""
              echo "Or use deploy/scripts/bootstrap-server.sh"
              echo "Then set GitHub secret DEPLOY_REPO_DIR if you used another path."
              exit 1
            fi

            cd "$REPO_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            if [ ! -f deploy/.env ]; then
              echo "ERROR: missing deploy/.env — copy deploy/.env.example and fill secrets"
              exit 1
            fi

            cd deploy
            docker compose -f docker-compose.prod.yml --env-file .env build
            docker compose -f docker-compose.prod.yml --env-file .env run --rm migrate
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            ./scripts/docker-prune.sh

            docker compose -f docker-compose.prod.yml --env-file .env ps

            curl -sf -H "Host: api.druz9.ru" http://127.0.0.1/healthz
