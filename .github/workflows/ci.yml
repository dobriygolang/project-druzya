name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  service:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [identity, content, interview, ai, recommendation, billing, sandbox, rooms]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - uses: bufbuild/buf-setup-action@v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          version: "1.47.0"

      - name: Cache protoc plugins
        uses: actions/cache@v4
        with:
          path: deploy/.proto-bin
          key: proto-plugins-v1-${{ runner.os }}-${{ hashFiles('deploy/scripts/install-proto-tools.sh') }}

      - name: Generate protobuf (all services)
        working-directory: ${{ github.workspace }}
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: bash deploy/scripts/gen-all-proto.sh

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        env:
          GOWORK: off
        with:
          version: v2.6.2
          working-directory: services/${{ matrix.service }}
          args: --config=.golangci.yml --timeout=5m

      - name: Test
        run: GOWORK=off go test -race -count=1 ./...
        env:
          GOPROXY: https://proxy.golang.org,direct

      - name: Build
        run: GOWORK=off go build ./...

  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"

      - name: Install
        run: npm ci --no-audit --no-fund
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

      - name: Typecheck and build
        run: npm run build
        env:
          VITE_API_BASE: /v1

  caddy-image:
    name: caddy-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"

      - name: Build production Caddy + SPA image
        run: |
          cd apps/web && npm ci --no-audit --no-fund && npm run build
          cd ../.. && docker build -f deploy/Dockerfile.caddy -t druzya-caddy:ci .
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          VITE_API_BASE: /v1
