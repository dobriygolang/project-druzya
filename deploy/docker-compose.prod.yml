name: druzya-prod

x-service-env: &service-env
  APP_ENV: production
  LOG_LEVEL: ${LOG_LEVEL:-info}
  GRPC_HOST: ${GRPC_HOST:-0.0.0.0}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}

x-health-ready: &health-ready
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 45s

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=6GB
      -c effective_cache_size=20GB
      -c work_mem=16MB
      -c maintenance_work_mem=512MB
      -c random_page_cost=1.1
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: druzya
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d druzya"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  identity:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: identity
    restart: unless-stopped
    user: "0:0"
    env_file: .env
    environment:
      <<: *service-env
      HTTP_PORT: 8080
      GRPC_PORT: 9090
      POSTGRES_DSN: ${IDENTITY_POSTGRES_DSN}
      REDIS_ADDR: redis:6379
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt/private.pem
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt/public.pem
      FRONTEND_URL: ${FRONTEND_URL}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI}
      AUTH_RATE_LIMIT_PER_MINUTE: ${AUTH_RATE_LIMIT_PER_MINUTE:-60}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
    volumes:
      - ./secrets/jwt:/run/secrets/jwt:ro
    healthcheck:
      <<: *health-ready
      start_period: 90s
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: identity
        CMD: identity-bot
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_ADDR: redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      redis:
        condition: service_healthy

  content:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: content
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *service-env
      HTTP_PORT: 8081
      GRPC_PORT: 9091
      POSTGRES_DSN: ${CONTENT_POSTGRES_DSN}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
    healthcheck:
      <<: *health-ready
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/readyz"]
    depends_on:
      migrate:
        condition: service_completed_successfully

  interview:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: interview
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *service-env
      HTTP_PORT: 8082
      GRPC_PORT: 9092
      POSTGRES_DSN: ${INTERVIEW_POSTGRES_DSN}
      CONTENT_GRPC_ADDR: content:9091
      BILLING_GRPC_ADDR: billing:9095
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt/public.pem
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      OUTBOX_RELAY_ENABLED: ${OUTBOX_RELAY_ENABLED:-true}
    volumes:
      - ./secrets/jwt:/run/secrets/jwt:ro
    healthcheck:
      <<: *health-ready
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/readyz"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      content:
        condition: service_healthy
      identity:
        condition: service_started
      billing:
        condition: service_healthy
      nats:
        condition: service_healthy

  ai:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: ai
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *service-env
      HTTP_PORT: 8083
      GRPC_PORT: 9093
      POSTGRES_DSN: ${AI_POSTGRES_DSN}
      INTERVIEW_GRPC_ADDR: interview:9092
      CONTENT_GRPC_ADDR: content:9091
      BILLING_GRPC_ADDR: billing:9095
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      LLM_CHAIN_ORDER: ${LLM_CHAIN_ORDER}
      LLM_FREE_CHAIN_ORDER: ${LLM_FREE_CHAIN_ORDER:-${LLM_CHAIN_ORDER}}
      LLM_PAID_CHAIN_ORDER: ${LLM_PAID_CHAIN_ORDER:-deepseek,groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_PAID_API_KEY: ${GROQ_PAID_API_KEY}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_PAID_API_KEY: ${OPENROUTER_PAID_API_KEY}
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      LLM_CAVEMAN: ${LLM_CAVEMAN:-lite}
      LLM_PROMPT_CACHE: ${LLM_PROMPT_CACHE:-on}
      LLM_PROMPT_CACHE_MAX_ENTRIES: ${LLM_PROMPT_CACHE_MAX_ENTRIES:-1000}
      LLM_PROMPT_CACHE_TTL: ${LLM_PROMPT_CACHE_TTL:-24h}
      REDIS_ADDR: redis:6379
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-2s}
      EVAL_WORKER_CONCURRENCY: ${EVAL_WORKER_CONCURRENCY:-20}
      EVAL_MAX_RETRIES: ${EVAL_MAX_RETRIES:-3}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      OUTBOX_POLL_ENABLED: ${OUTBOX_POLL_ENABLED:-false}
    healthcheck:
      <<: *health-ready
      start_period: 90s
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/readyz"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      interview:
        condition: service_healthy
      content:
        condition: service_healthy
      billing:
        condition: service_healthy
      nats:
        condition: service_healthy

  recommendation:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: recommendation
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *service-env
      HTTP_PORT: 8084
      GRPC_PORT: 9094
      POSTGRES_DSN: ${RECOMMENDATION_POSTGRES_DSN}
      INTERVIEW_GRPC_ADDR: interview:9092
      CONTENT_GRPC_ADDR: content:9091
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt/public.pem
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-2s}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      OUTBOX_POLL_ENABLED: ${OUTBOX_POLL_ENABLED:-false}
    volumes:
      - ./secrets/jwt:/run/secrets/jwt:ro
    healthcheck:
      <<: *health-ready
      timeout: 15s
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8084/readyz"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      interview:
        condition: service_healthy
      content:
        condition: service_healthy
      ai:
        condition: service_healthy
      nats:
        condition: service_healthy

  billing:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: billing
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *service-env
      HTTP_PORT: 8085
      GRPC_PORT: 9095
      POSTGRES_DSN: ${BILLING_POSTGRES_DSN}
      REDIS_ADDR: redis:6379
      ENTITLEMENTS_CACHE_TTL: ${ENTITLEMENTS_CACHE_TTL:-60s}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      IDENTITY_GRPC_ADDR: identity:9090
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt/public.pem
      TRIBUTE_WEBHOOK_SECRET: ${TRIBUTE_WEBHOOK_SECRET:-}
      TRIBUTE_TIER_MAP: ${TRIBUTE_TIER_MAP:-tribute_pro_monthly:pro_monthly}
      TRIBUTE_PRO_CHECKOUT_URL: ${TRIBUTE_PRO_CHECKOUT_URL:-}
      TRIBUTE_PRO_TELEGRAM_CHECKOUT_URL: ${TRIBUTE_PRO_TELEGRAM_CHECKOUT_URL:-}
      TRIBUTE_CHECKOUT_URLS: ${TRIBUTE_CHECKOUT_URLS:-}
      TRIBUTE_TELEGRAM_CHECKOUT_URLS: ${TRIBUTE_TELEGRAM_CHECKOUT_URLS:-}
      PRO_TRIAL_ENABLED: ${PRO_TRIAL_ENABLED:-true}
      PRO_TRIAL_DAYS: ${PRO_TRIAL_DAYS:-14}
    volumes:
      - ./secrets/jwt:/run/secrets/jwt:ro
    healthcheck:
      <<: *health-ready
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8085/readyz"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      identity:
        condition: service_healthy

  sandbox:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: sandbox
    restart: unless-stopped
    user: "0:0"
    env_file: .env
    environment:
      <<: *service-env
      HTTP_PORT: 8086
      GRPC_PORT: 9096
      POSTGRES_DSN: ${SANDBOX_POSTGRES_DSN}
      CONTENT_GRPC_ADDR: content:9091
      INTERVIEW_GRPC_ADDR: interview:9092
      BILLING_GRPC_ADDR: billing:9095
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt/public.pem
      RUNNER_MODE: ${SANDBOX_RUNNER_MODE:-docker}
      SANDBOX_MAX_OUTPUT_BYTES: ${SANDBOX_MAX_OUTPUT_BYTES:-65536}
      SANDBOX_DEFAULT_TIMEOUT_MS: ${SANDBOX_DEFAULT_TIMEOUT_MS:-10000}
      SANDBOX_ASYNC_RUNS: ${SANDBOX_ASYNC_RUNS:-auto}
      SANDBOX_DOCKER_GO_IMAGE: ${SANDBOX_DOCKER_GO_IMAGE:-golang:1.24-alpine}
      SANDBOX_DOCKER_PYTHON_IMAGE: ${SANDBOX_DOCKER_PYTHON_IMAGE:-python:3.12-alpine}
      SANDBOX_DOCKER_NODE_IMAGE: ${SANDBOX_DOCKER_NODE_IMAGE:-node:22-alpine}
      SANDBOX_DOCKER_WORK_ROOT: /var/lib/sandbox-work
    volumes:
      - ./secrets/jwt:/run/secrets/jwt:ro
      # Host path must match SANDBOX_DOCKER_WORK_ROOT so docker.sock bind mounts resolve on the host.
      - /var/lib/sandbox-work:/var/lib/sandbox-work
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      <<: *health-ready
      timeout: 15s
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8086/healthz"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      billing:
        condition: service_healthy

  rooms:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: rooms
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *service-env
      HTTP_PORT: 8087
      GRPC_PORT: 9097
      POSTGRES_DSN: ${ROOMS_POSTGRES_DSN}
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt/public.pem
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      ROOM_INVITE_SECRET: ${ROOM_INVITE_SECRET}
      ROOM_TTL: ${ROOM_TTL:-6h}
      GUEST_ROOM_TTL: ${GUEST_ROOM_TTL:-1h}
      ROOM_ARCHIVE_INTERVAL: ${ROOM_ARCHIVE_INTERVAL:-1m}
      IDENTITY_GRPC_ADDR: identity:9090
      BILLING_GRPC_ADDR: billing:9095
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
    volumes:
      - ./secrets/jwt:/run/secrets/jwt:ro
    healthcheck:
      <<: *health-ready
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8087/healthz"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      identity:
        condition: service_healthy
      billing:
        condition: service_healthy

  caddy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    restart: unless-stopped
    # Do not bind host :80/:443 — nginx on the host uses them (e.g. VPN). Proxy druz9 → 127.0.0.1:CADDY_HTTP_PORT.
    ports:
      - "127.0.0.1:${CADDY_HTTP_PORT:-18080}:80"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      identity:
        condition: service_healthy
      content:
        condition: service_healthy
      interview:
        condition: service_healthy
      recommendation:
        condition: service_healthy
      ai:
        condition: service_healthy
      billing:
        condition: service_healthy
      sandbox:
        condition: service_healthy
      rooms:
        condition: service_healthy
      admin:
        condition: service_healthy

  admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: admin
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *service-env
      HTTP_PORT: 8088
      GRPC_PORT: 9098
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt/public.pem
      ADMIN_USER_IDS: ${ADMIN_USER_IDS}
      CONTENT_ADMIN_TOKEN: ${ADMIN_API_TOKEN}
      CONTENT_GRPC_ADDR: content:9091
      IDENTITY_GRPC_ADDR: identity:9090
      BILLING_GRPC_ADDR: billing:9095
      AI_GRPC_ADDR: ai:9093
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./secrets/jwt:/run/secrets/jwt:ro
    healthcheck:
      <<: *health-ready
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8088/healthz"]
    depends_on:
      content:
        condition: service_healthy
      billing:
        condition: service_healthy
      ai:
        condition: service_healthy

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9099:9090"
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      identity:
        condition: service_healthy

  node_exporter:
    profiles: [monitoring]
    image: prom/node-exporter:v1.9.0
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "127.0.0.1:9100:9100"
    deploy:
      resources:
        limits:
          memory: 64M

  alloy:
    profiles: [monitoring]
    image: grafana/alloy:v1.8.1
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    environment:
      GRAFANA_CLOUD_PROMETHEUS_URL: ${GRAFANA_CLOUD_PROMETHEUS_URL}
      GRAFANA_CLOUD_PROMETHEUS_USER: ${GRAFANA_CLOUD_PROMETHEUS_USER}
      GRAFANA_CLOUD_PROMETHEUS_API_KEY: ${GRAFANA_CLOUD_PROMETHEUS_API_KEY}
    volumes:
      - ./grafana/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      identity:
        condition: service_healthy
      content:
        condition: service_healthy
      ai:
        condition: service_healthy

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:11.5.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.druz9.online/}
      GF_SERVER_DOMAIN: grafana.druz9.online
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY_MAX_AGE_SECONDS: "31536000"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - prometheus

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  alloy_data:
