global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: identity
    static_configs:
      - targets: ["identity:8080"]
    metrics_path: /metrics

  - job_name: billing
    static_configs:
      - targets: ["billing:8085"]
    metrics_path: /metrics

  - job_name: sandbox
    static_configs:
      - targets: ["sandbox:8086"]
    metrics_path: /metrics

  - job_name: rooms
    static_configs:
      - targets: ["rooms:8087"]
    metrics_path: /metrics

  - job_name: tracker
    static_configs:
      - targets: ["tracker:8089"]
    metrics_path: /metrics

  - job_name: notes
    static_configs:
      - targets: ["notes:8090"]
    metrics_path: /metrics

  - job_name: focus
    static_configs:
      - targets: ["focus:8091"]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: ["node_exporter:9100"]
