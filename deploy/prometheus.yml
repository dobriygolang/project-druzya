global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: identity
    static_configs:
      - targets: ["identity:8080"]
    metrics_path: /metrics

  - job_name: content
    static_configs:
      - targets: ["content:8081"]
    metrics_path: /metrics

  - job_name: interview
    static_configs:
      - targets: ["interview:8082"]
    metrics_path: /metrics

  - job_name: ai
    static_configs:
      - targets: ["ai:8083"]
    metrics_path: /metrics

  - job_name: recommendation
    static_configs:
      - targets: ["recommendation:8084"]
    metrics_path: /metrics

  - job_name: billing
    static_configs:
      - targets: ["billing:8085"]
    metrics_path: /metrics

  - job_name: sandbox
    static_configs:
      - targets: ["sandbox:8086"]
    metrics_path: /metrics

  - job_name: rooms
    static_configs:
      - targets: ["rooms:8087"]
    metrics_path: /metrics

  - job_name: admin
    static_configs:
      - targets: ["admin:8088"]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: ["node_exporter:9100"]
