syntax = "proto3";

package identity.v1;

option go_package = "github.com/sedorofeevd/project-druzya/services/identity/pkg/api/identity/v1;identityv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service IdentityService {
  rpc AuthTelegram(AuthTelegramRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/telegram"
      body: "*"
    };
  }

  rpc GetYandexAuthURL(GetYandexAuthURLRequest) returns (GetYandexAuthURLResponse) {
    option (google.api.http) = {
      get: "/v1/auth/yandex/url"
    };
  }

  rpc YandexCallback(YandexCallbackRequest) returns (YandexCallbackResponse);

  rpc ExchangeYandexCode(ExchangeYandexCodeRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/yandex/exchange"
      body: "*"
    };
  }

  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/refresh"
      body: "*"
    };
  }

  rpc Logout(LogoutRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/logout"
      body: "*"
    };
  }

  rpc GetMe(google.protobuf.Empty) returns (GetUserResponse) {
    option (google.api.http) = {
      get: "/v1/me"
    };
  }

  rpc LinkYandex(LinkYandexRequest) returns (GetUserResponse) {
    option (google.api.http) = {
      post: "/v1/me/link/yandex"
      body: "*"
    };
  }
  
  // s2s
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserByTelegramID(GetUserByTelegramIDRequest) returns (GetUserResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc MintScopedAccessToken(MintScopedAccessTokenRequest) returns (MintScopedAccessTokenResponse);
  rpc GetUserStats(GetUserStatsRequest) returns (GetUserStatsResponse);
  rpc GetOpsStats(GetOpsStatsRequest) returns (GetOpsStatsResponse);
}

message User {
  string id = 1;
  string username = 2;
  string avatar_url = 3;
  google.protobuf.Timestamp created_at = 4;
  int64 telegram_id = 5;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message AuthTelegramRequest {
  string code = 1;
}

message GetYandexAuthURLRequest {}

message GetYandexAuthURLResponse {
  string url = 1;
  string state = 2;
}

message YandexCallbackRequest {
  string code = 1;
  string state = 2;
}

message YandexCallbackResponse {
  string redirect_url = 1;
}

message ExchangeYandexCodeRequest {
  string exchange_code = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LinkYandexRequest {
  string code = 1;
}

message GetUserRequest {
  string id = 1;
}

message GetUserByTelegramIDRequest {
  int64 telegram_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  string user_id = 1;
  bool valid = 2;
}

message MintScopedAccessTokenRequest {
  string role = 1;
  string scope = 2;
  string display_name = 3;
  int32 ttl_seconds = 4;
}

message MintScopedAccessTokenResponse {
  string access_token = 1;
  string user_id = 2;
  int32 expires_in = 3;
}

message GetUserStatsRequest {}

message GetUserStatsResponse {
  int64 total_users = 1;
  int64 new_users_24h = 2;
  int64 new_users_7d = 3;
  int64 new_users_30d = 4;
  int64 active_users_7d = 5;
}

message GetOpsStatsRequest {}

message GetOpsStatsResponse {
  string service_name = 1;
  string database_name = 2;
  int64 database_size_bytes = 3;
  int64 memory_alloc_bytes = 4;
  int64 memory_sys_bytes = 5;
  int32 goroutines = 6;
  double http_rps = 7;
}
