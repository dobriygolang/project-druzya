syntax = "proto3";

package recommendation.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/sedorofeevd/project-druzya/services/recommendation/pkg/api/recommendation/v1;recommendationv1";

enum RecommendationType {
  RECOMMENDATION_TYPE_UNSPECIFIED = 0;
  RECOMMENDATION_TYPE_IMPROVE_SKILL = 1;
  RECOMMENDATION_TYPE_REWRITE_ANSWER = 2;
  RECOMMENDATION_TYPE_PRACTICE_SECTION = 3;
  RECOMMENDATION_TYPE_TAKE_MOCK_INTERVIEW = 4;
}

enum RecommendationPriority {
  RECOMMENDATION_PRIORITY_UNSPECIFIED = 0;
  RECOMMENDATION_PRIORITY_HIGH = 1;
  RECOMMENDATION_PRIORITY_MEDIUM = 2;
  RECOMMENDATION_PRIORITY_LOW = 3;
}

enum RecommendationStatus {
  RECOMMENDATION_STATUS_UNSPECIFIED = 0;
  RECOMMENDATION_STATUS_ACTIVE = 1;
  RECOMMENDATION_STATUS_DISMISSED = 2;
  RECOMMENDATION_STATUS_COMPLETED = 3;
}

enum DailyBriefItemType {
  DAILY_BRIEF_ITEM_TYPE_UNSPECIFIED = 0;
  DAILY_BRIEF_ITEM_TYPE_RETRY_TASK = 1;
  DAILY_BRIEF_ITEM_TYPE_WEAK_SKILL = 2;
  DAILY_BRIEF_ITEM_TYPE_RECOMMENDATION = 3;
  DAILY_BRIEF_ITEM_TYPE_TAKE_MOCK = 4;
  DAILY_BRIEF_ITEM_TYPE_START_MOCK = 5;
  DAILY_BRIEF_ITEM_TYPE_READ_ARTICLE = 6;
  DAILY_BRIEF_ITEM_TYPE_PRACTICE_STALE_MODE = 7;
}

service RecommendationService {
  rpc GetDashboard(GetDashboardRequest) returns (GetDashboardResponse) {
    option (google.api.http) = {get: "/v1/recommendations/dashboard"};
  }

  rpc GetMockHubContext(GetMockHubContextRequest) returns (GetMockHubContextResponse) {
    option (google.api.http) = {get: "/v1/recommendations/mock-hub"};
  }

  rpc DismissRecommendation(DismissRecommendationRequest) returns (DismissRecommendationResponse) {
    option (google.api.http) = {
      post: "/v1/recommendations/{id}/dismiss"
      body: "*"
    };
  }

  rpc CompleteRecommendation(CompleteRecommendationRequest) returns (CompleteRecommendationResponse) {
    option (google.api.http) = {
      post: "/v1/recommendations/{id}/complete"
      body: "*"
    };
  }

  rpc MarkArticleRead(MarkArticleReadRequest) returns (MarkArticleReadResponse) {
    option (google.api.http) = {
      post: "/v1/recommendations/articles/{slug}/read"
      body: "*"
    };
  }
}

service RecommendationInternalService {
  rpc GetTaskPickerHints(GetTaskPickerHintsRequest) returns (GetTaskPickerHintsResponse);
}

message GetDashboardRequest {}

message GetDashboardResponse {
  int32 readiness_score = 1;
  repeated SkillInsight strengths = 2;
  repeated SkillInsight weaknesses = 3;
  repeated Recommendation recommendations = 4;
  reserved 5;
  reserved "learning_plan";
  int32 pending_retry_count = 6;
  reserved 7;
  reserved "profile_summary";
  DailyBrief daily_brief = 8;
  repeated string read_article_slugs = 9;
}

message DailyBrief {
  int32 readiness_score = 1;
  repeated DailyBriefItem items = 2;
}

message DailyBriefItem {
  DailyBriefItemType type = 1;
  string title = 2;
  optional string description = 3;
  optional string action_label = 4;
  optional string action_path = 5;
  optional string retry_item_id = 6;
  optional string skill_key = 7;
  optional string secondary_action_label = 8;
  optional string secondary_action_path = 9;
}

message SkillInsight {
  string skill_key = 1;
  int32 score = 2;
  int32 confidence = 3;
}

message Recommendation {
  string id = 1;
  RecommendationType type = 2;
  RecommendationPriority priority = 3;
  optional string skill_key = 4;
  string title = 5;
  string description = 6;
  RecommendationStatus status = 7;
  google.protobuf.Timestamp created_at = 8;
}

message DismissRecommendationRequest {
  string id = 1;
}

message DismissRecommendationResponse {}

message CompleteRecommendationRequest {
  string id = 1;
}

message CompleteRecommendationResponse {}

message MarkArticleReadRequest {
  string slug = 1;
}

message MarkArticleReadResponse {
  string slug = 1;
  google.protobuf.Timestamp read_at = 2;
}

message GetMockHubContextRequest {}

message GetMockHubContextResponse {
  repeated StalePracticeMode stale_modes = 1;
  repeated TemplateProgress template_progress = 2;
  repeated TaskTypeCoverage task_type_coverage = 3;
}

message StalePracticeMode {
  string session_mode = 1;
  string task_type = 2;
  optional google.protobuf.Timestamp last_practiced_at = 3;
  int32 days_since = 4;
}

message TemplateProgress {
  string template_id = 1;
  int32 best_total_score = 2;
  bool passed = 3;
  int32 attempts_count = 4;
  optional google.protobuf.Timestamp last_passed_at = 5;
  optional string last_session_id = 6;
  google.protobuf.Timestamp last_attempt_at = 7;
}

message TaskTypeCoverage {
  string task_type = 1;
  int32 passed_count = 2;
  int32 attempts_count = 3;
}

message GetTaskPickerHintsRequest {
  string user_id = 1;
  string task_type = 2;
}

message GetTaskPickerHintsResponse {
  repeated string passed_task_ids = 1;
  repeated ReviewTaskCandidate review_candidates = 2;
}

message ReviewTaskCandidate {
  string task_id = 1;
  string task_type = 2;
  int32 best_score = 3;
  google.protobuf.Timestamp last_passed_at = 4;
}
