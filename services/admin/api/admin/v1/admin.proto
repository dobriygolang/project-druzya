syntax = "proto3";

package admin.v1;

option go_package = "github.com/sedorofeevd/project-druzya/services/admin/pkg/api/admin/v1;adminv1";

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

service AdminService {
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {
    option (google.api.http) = {
      get: "/v1/admin/session"
    };
  }

  rpc GetDashboard(GetDashboardRequest) returns (GetDashboardResponse) {
    option (google.api.http) = {
      get: "/v1/admin/dashboard"
    };
  }

  rpc ListCompanies(ListCompaniesRequest) returns (ListCompaniesResponse) {
    option (google.api.http) = {
      get: "/v1/admin/content/companies"
    };
  }

  rpc UpsertCompany(UpsertCompanyRequest) returns (UpsertCompanyResponse) {
    option (google.api.http) = {
      post: "/v1/admin/content/companies"
      body: "*"
    };
  }

  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {
    option (google.api.http) = {
      get: "/v1/admin/content/tasks"
    };
  }

  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {
    option (google.api.http) = {
      get: "/v1/admin/content/tasks/{id}"
      additional_bindings {
        get: "/v1/admin/content/tasks/by-slug/{slug}"
      }
    };
  }

  rpc UpsertTask(UpsertTaskRequest) returns (UpsertTaskResponse) {
    option (google.api.http) = {
      post: "/v1/admin/content/tasks"
      body: "*"
    };
  }

  rpc ReplaceTaskSolutions(ReplaceTaskSolutionsRequest) returns (ReplaceTaskSolutionsResponse) {
    option (google.api.http) = {
      post: "/v1/admin/content/tasks/{task_id}/solutions"
      body: "*"
    };
  }

  rpc ListArticles(ListArticlesRequest) returns (ListArticlesResponse) {
    option (google.api.http) = {
      get: "/v1/admin/content/articles"
    };
  }

  rpc GetArticle(GetArticleRequest) returns (GetArticleResponse) {
    option (google.api.http) = {
      get: "/v1/admin/content/articles/{id}"
      additional_bindings {
        get: "/v1/admin/content/articles/by-slug/{slug}"
      }
    };
  }

  rpc UpsertArticle(UpsertArticleRequest) returns (UpsertArticleResponse) {
    option (google.api.http) = {
      post: "/v1/admin/content/articles"
      body: "*"
    };
  }

  rpc ListInterviewTemplates(ListInterviewTemplatesRequest) returns (ListInterviewTemplatesResponse) {
    option (google.api.http) = {
      get: "/v1/admin/content/interview-templates"
    };
  }

  rpc GetInterviewTemplateDetail(GetInterviewTemplateDetailRequest) returns (GetInterviewTemplateDetailResponse) {
    option (google.api.http) = {
      get: "/v1/admin/content/interview-templates/{id}/detail"
      additional_bindings {
        get: "/v1/admin/content/interview-templates/by-slug/{slug}/detail"
      }
    };
  }

  rpc UpsertInterviewTemplate(UpsertInterviewTemplateRequest) returns (UpsertInterviewTemplateResponse) {
    option (google.api.http) = {
      post: "/v1/admin/content/interview-templates"
      body: "*"
    };
  }

  rpc UpsertTemplateSection(UpsertTemplateSectionRequest) returns (UpsertTemplateSectionResponse) {
    option (google.api.http) = {
      post: "/v1/admin/content/interview-templates/sections"
      body: "*"
    };
  }

  rpc ReplaceTemplateStructure(ReplaceTemplateStructureRequest) returns (ReplaceTemplateStructureResponse) {
    option (google.api.http) = {
      post: "/v1/admin/content/interview-templates/{template_id}/structure"
      body: "*"
    };
  }

  rpc ListPlans(ListPlansRequest) returns (ListPlansResponse) {
    option (google.api.http) = {
      get: "/v1/admin/billing/plans"
    };
  }

  rpc GetUserEntitlements(GetUserEntitlementsRequest) returns (GetUserEntitlementsResponse) {
    option (google.api.http) = {
      get: "/v1/admin/billing/users/{user_id}/entitlements"
    };
  }

  rpc GrantSubscription(GrantSubscriptionRequest) returns (GrantSubscriptionResponse) {
    option (google.api.http) = {
      post: "/v1/admin/billing/subscriptions/grant"
      body: "*"
    };
  }

  rpc RevokeSubscription(RevokeSubscriptionRequest) returns (RevokeSubscriptionResponse) {
    option (google.api.http) = {
      post: "/v1/admin/billing/subscriptions/revoke"
      body: "*"
    };
  }

  rpc ListEvaluationJobs(ListEvaluationJobsRequest) returns (ListEvaluationJobsResponse) {
    option (google.api.http) = {
      get: "/v1/admin/ai/evaluation-jobs"
    };
  }

  rpc GetEvaluationJob(GetEvaluationJobRequest) returns (GetEvaluationJobResponse) {
    option (google.api.http) = {
      get: "/v1/admin/ai/evaluation-jobs/{id}"
    };
  }

  rpc GetLLMConfig(GetLLMConfigRequest) returns (GetLLMConfigResponse) {
    option (google.api.http) = {
      get: "/v1/admin/ai/llm/config"
    };
  }

  rpc UpdateLLMConfig(UpdateLLMConfigRequest) returns (UpdateLLMConfigResponse) {
    option (google.api.http) = {
      put: "/v1/admin/ai/llm/config"
      body: "*"
    };
  }

  rpc ProbeLLMProviders(ProbeLLMProvidersRequest) returns (ProbeLLMProvidersResponse) {
    option (google.api.http) = {
      post: "/v1/admin/ai/llm/probe"
      body: "*"
    };
  }
}

message GetSessionRequest {}

message GetSessionResponse {
  string user_id = 1;
}

message Company {
  string id = 1;
  string slug = 2;
  string name = 3;
  optional string description = 4;
  bool is_active = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Task {
  string id = 1;
  string slug = 2;
  string type = 3;
  string title = 4;
  string description = 5;
  string difficulty = 6;
  optional int32 estimated_minutes = 7;
  google.protobuf.Struct metadata = 8;
  string status = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message TaskSolution {
  string id = 1;
  string task_id = 2;
  optional string language = 3;
  string solution_text = 4;
  optional string explanation = 5;
  optional string complexity = 6;
  bool is_primary = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message TaskSolutionInput {
  optional string id = 1;
  optional string language = 2;
  string solution_text = 3;
  optional string explanation = 4;
  optional string complexity = 5;
  bool is_primary = 6;
}

message ListCompaniesRequest {
  bool active_only = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListCompaniesResponse {
  repeated Company companies = 1;
}

message UpsertCompanyRequest {
  optional string id = 1;
  string slug = 2;
  string name = 3;
  optional string description = 4;
  bool is_active = 5;
}

message UpsertCompanyResponse {
  Company company = 1;
}

message ListTasksRequest {
  optional string type = 1;
  optional string difficulty = 2;
  optional string status = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message GetTaskRequest {
  string id = 1;
  string slug = 2;
}

message GetTaskResponse {
  Task task = 1;
  repeated TaskSolution solutions = 2;
}

message UpsertTaskRequest {
  optional string id = 1;
  string slug = 2;
  string type = 3;
  string title = 4;
  string description = 5;
  string difficulty = 6;
  optional int32 estimated_minutes = 7;
  google.protobuf.Struct metadata = 8;
  string status = 9;
}

message UpsertTaskResponse {
  Task task = 1;
}

message ReplaceTaskSolutionsRequest {
  string task_id = 1;
  repeated TaskSolutionInput solutions = 2;
}

message ReplaceTaskSolutionsResponse {
  repeated TaskSolution solutions = 1;
}

enum ArticleStatus {
  ARTICLE_STATUS_UNSPECIFIED = 0;
  ARTICLE_STATUS_DRAFT = 1;
  ARTICLE_STATUS_PUBLISHED = 2;
  ARTICLE_STATUS_ARCHIVED = 3;
}

enum ArticleVideoProvider {
  ARTICLE_VIDEO_PROVIDER_UNSPECIFIED = 0;
  ARTICLE_VIDEO_PROVIDER_YOUTUBE = 1;
  ARTICLE_VIDEO_PROVIDER_VIMEO = 2;
  ARTICLE_VIDEO_PROVIDER_OTHER = 3;
}

message ArticleVideo {
  string title = 1;
  string url = 2;
  ArticleVideoProvider provider = 3;
  int32 position = 4;
  optional int32 duration_seconds = 5;
}

message ArticleTaskLink {
  string task_id = 1;
  string slug = 2;
  string title = 3;
  string type = 4;
  string difficulty = 5;
  int32 position = 6;
}

message Article {
  string id = 1;
  string slug = 2;
  string title = 3;
  string summary = 4;
  string body = 5;
  ArticleStatus status = 6;
  optional int32 reading_minutes = 7;
  repeated string skill_keys = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  repeated ArticleVideo videos = 11;
  repeated ArticleTaskLink linked_tasks = 12;
}

message ListArticlesRequest {
  ArticleStatus status = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListArticlesResponse {
  repeated Article articles = 1;
}

message GetArticleRequest {
  string id = 1;
  string slug = 2;
}

message GetArticleResponse {
  Article article = 1;
}

message UpsertArticleRequest {
  optional string id = 1;
  string slug = 2;
  string title = 3;
  string summary = 4;
  string body = 5;
  ArticleStatus status = 6;
  optional int32 reading_minutes = 7;
  repeated string skill_keys = 8;
  repeated ArticleVideo videos = 9;
  repeated string task_slugs = 10;
}

message UpsertArticleResponse {
  Article article = 1;
}

message InterviewTemplate {
  string id = 1;
  optional string company_id = 2;
  string slug = 3;
  string title = 4;
  optional string description = 5;
  optional string target_role = 6;
  optional string target_level = 7;
  int32 passing_score = 8;
  bool is_active = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message TemplateSection {
  string id = 1;
  string template_id = 2;
  string section_type = 3;
  string title = 4;
  optional string description = 5;
  int32 position = 6;
  optional int32 passing_score = 7;
  int32 tasks_count = 8;
  repeated string task_ids = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message ListInterviewTemplatesRequest {
  optional string company_id = 1;
  bool active_only = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListInterviewTemplatesResponse {
  repeated InterviewTemplate templates = 1;
}

message GetInterviewTemplateDetailRequest {
  string id = 1;
  string slug = 2;
}

message GetInterviewTemplateDetailResponse {
  InterviewTemplate template = 1;
  repeated TemplateSection sections = 2;
}

message UpsertInterviewTemplateRequest {
  optional string id = 1;
  optional string company_id = 2;
  string slug = 3;
  string title = 4;
  optional string description = 5;
  optional string target_role = 6;
  optional string target_level = 7;
  int32 passing_score = 8;
  bool is_active = 9;
}

message UpsertInterviewTemplateResponse {
  InterviewTemplate template = 1;
}

message UpsertTemplateSectionRequest {
  optional string id = 1;
  string template_id = 2;
  string section_type = 3;
  string title = 4;
  optional string description = 5;
  int32 position = 6;
  optional int32 passing_score = 7;
}

message UpsertTemplateSectionResponse {
  TemplateSection section = 1;
}

message TemplateStructureSection {
  optional string id = 1;
  string section_type = 2;
  string title = 3;
  optional string description = 4;
  int32 position = 5;
  optional int32 passing_score = 6;
  repeated string task_ids = 7;
}

message ReplaceTemplateStructureRequest {
  string template_id = 1;
  repeated TemplateStructureSection sections = 2;
}

message ReplaceTemplateStructureResponse {
  InterviewTemplate template = 1;
  repeated TemplateSection sections = 2;
}

message PlanEntitlementSpec {
  string type = 1;
  optional int32 limit = 2;
  bool unlimited = 3;
  string period = 4;
  bool value = 5;
}

message PlanCatalog {
  string slug = 1;
  string name = 2;
  string tagline = 3;
  bool highlight = 4;
  repeated string highlights = 5;
  map<string, bool> features = 6;
  map<string, PlanEntitlementSpec> limits = 7;
}

message ListPlansRequest {}

message ListPlansResponse {
  repeated PlanCatalog plans = 1;
}

message UsageLimit {
  int32 used = 1;
  optional int32 limit = 2;
  optional int32 remaining = 3;
  google.protobuf.Timestamp period_start = 4;
  google.protobuf.Timestamp period_end = 5;
  bool unlimited = 6;
}

message UserEntitlements {
  string user_id = 1;
  string plan_slug = 2;
  string plan_name = 3;
  map<string, bool> features = 4;
  map<string, UsageLimit> limits = 5;
}

message GetUserEntitlementsRequest {
  string user_id = 1;
}

message GetUserEntitlementsResponse {
  UserEntitlements entitlements = 1;
}

message GrantSubscriptionRequest {
  string user_id = 1;
  string plan_slug = 2;
  google.protobuf.Timestamp current_period_end = 3;
}

message GrantSubscriptionResponse {
  string subscription_id = 1;
  string plan_slug = 2;
  string status = 3;
}

message RevokeSubscriptionRequest {
  string user_id = 1;
}

message RevokeSubscriptionResponse {
  bool revoked = 1;
}

enum EvaluationJobStatus {
  EVALUATION_JOB_STATUS_UNSPECIFIED = 0;
  EVALUATION_JOB_STATUS_PENDING = 1;
  EVALUATION_JOB_STATUS_RUNNING = 2;
  EVALUATION_JOB_STATUS_COMPLETED = 3;
  EVALUATION_JOB_STATUS_FAILED = 4;
}

message EvaluationJob {
  string id = 1;
  string attempt_id = 2;
  string user_id = 3;
  string task_id = 4;
  EvaluationJobStatus status = 5;
  int32 retry_count = 6;
  bool retryable = 7;
  optional string error = 8;
  optional google.protobuf.Timestamp next_retry_at = 9;
  optional google.protobuf.Timestamp started_at = 10;
  optional google.protobuf.Timestamp completed_at = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message ListEvaluationJobsRequest {
  optional EvaluationJobStatus status = 1;
  int32 limit = 2;
}

message ListEvaluationJobsResponse {
  repeated EvaluationJob jobs = 1;
}

message GetEvaluationJobRequest {
  string id = 1;
}

message GetEvaluationJobResponse {
  EvaluationJob job = 1;
}

message LLMRuntimeConfig {
  int64 version = 1;
  repeated string chain_order = 2;
  string task_map_json = 3;
  string virtual_chains_json = 4;
}

message GetLLMConfigRequest {}

message GetLLMConfigResponse {
  LLMRuntimeConfig config = 1;
}

message UpdateLLMConfigRequest {
  int64 expected_version = 1;
  repeated string chain_order = 2;
  string task_map_json = 3;
  string virtual_chains_json = 4;
}

message UpdateLLMConfigResponse {
  LLMRuntimeConfig config = 1;
}

message ProbeLLMProvidersRequest {}

message LLMProviderProbe {
  string provider = 1;
  string model = 2;
  bool registered = 3;
  bool ok = 4;
  int64 latency_ms = 5;
  optional string error = 6;
}

message ProbeLLMProvidersResponse {
  repeated LLMProviderProbe probes = 1;
}

message GetDashboardRequest {}

message ServiceHealth {
  string name = 1;
  bool ok = 2;
  optional string error = 3;
}

message CatalogCounts {
  int32 companies = 1;
  int32 tasks = 2;
  int32 templates = 3;
  int32 plans = 4;
  int32 articles = 5;
}

message EvaluationJobCounts {
  int32 pending = 1;
  int32 running = 2;
  int32 failed = 3;
  int32 completed = 4;
}

message EvaluationJobAlert {
  string id = 1;
  string attempt_id = 2;
  string user_id = 3;
  string status = 4;
  optional string error = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message GetDashboardResponse {
  repeated ServiceHealth services = 1;
  CatalogCounts catalog = 2;
  EvaluationJobCounts evaluation_jobs = 3;
  repeated EvaluationJobAlert recent_failed_jobs = 4;
  LLMRuntimeConfig llm_config = 5;
  UserStats users = 6;
  repeated ServiceRuntime runtimes = 7;
  double total_http_rps = 8;
  int64 total_database_size_bytes = 9;
}

message UserStats {
  int64 total_users = 1;
  int64 new_users_24h = 2;
  int64 new_users_7d = 3;
  int64 new_users_30d = 4;
  int64 active_users_7d = 5;
  int64 active_subscriptions = 6;
}

message ServiceRuntime {
  string name = 1;
  string database_name = 2;
  int64 database_size_bytes = 3;
  int64 memory_alloc_bytes = 4;
  int64 memory_sys_bytes = 5;
  int32 goroutines = 6;
  double http_rps = 7;
}
