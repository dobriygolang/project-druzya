syntax = "proto3";

package content.v1;

option go_package = "github.com/sedorofeevd/project-druzya/services/content/pkg/api/content/v1;contentv1";

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

service ContentService {
  rpc ListCompanies(ListCompaniesRequest) returns (ListCompaniesResponse) {
    option (google.api.http) = {
      get: "/v1/companies"
    };
  }

  rpc GetCompany(GetCompanyRequest) returns (GetCompanyResponse) {
    option (google.api.http) = {
      get: "/v1/companies/{id}"
      additional_bindings {
        get: "/v1/companies/by-slug/{slug}"
      }
    };
  }

  rpc ListInterviewTemplates(ListInterviewTemplatesRequest) returns (ListInterviewTemplatesResponse) {
    option (google.api.http) = {
      get: "/v1/interview-templates"
    };
  }

  rpc GetInterviewTemplateDetail(GetInterviewTemplateDetailRequest) returns (GetInterviewTemplateDetailResponse) {
    option (google.api.http) = {
      get: "/v1/interview-templates/{id}/detail"
      additional_bindings {
        get: "/v1/interview-templates/by-slug/{slug}/detail"
      }
    };
  }

  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {
    option (google.api.http) = {
      get: "/v1/tasks"
    };
  }

  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {
    option (google.api.http) = {
      get: "/v1/tasks/{id}"
      additional_bindings {
        get: "/v1/tasks/by-slug/{slug}"
      }
    };
  }

  rpc GetTaskBundle(GetTaskBundleRequest) returns (GetTaskBundleResponse) {
    option (google.api.http) = {
      get: "/v1/tasks/{task_id}/bundle"
    };
  }

  rpc GetRubric(GetRubricRequest) returns (GetRubricResponse) {
    option (google.api.http) = {
      get: "/v1/rubrics/{id}"
    };
  }

  rpc ListArticles(ListArticlesRequest) returns (ListArticlesResponse) {
    option (google.api.http) = {
      get: "/v1/articles"
    };
  }

  rpc GetArticle(GetArticleRequest) returns (GetArticleResponse) {
    option (google.api.http) = {
      get: "/v1/articles/{id}"
      additional_bindings {
        get: "/v1/articles/by-slug/{slug}"
      }
    };
  }
}


// Internal admin API — no HTTP annotations; protect with x-admin-token.
service ContentAdminService {
  rpc UpsertCompany(UpsertCompanyRequest) returns (UpsertCompanyResponse);
  rpc UpsertTask(UpsertTaskRequest) returns (UpsertTaskResponse);
  rpc UpsertInterviewTemplate(UpsertInterviewTemplateRequest) returns (UpsertInterviewTemplateResponse);
  rpc UpsertTemplateSection(UpsertTemplateSectionRequest) returns (UpsertTemplateSectionResponse);
  rpc ReplaceTemplateStructure(ReplaceTemplateStructureRequest) returns (ReplaceTemplateStructureResponse);
  rpc UpsertArticle(UpsertArticleRequest) returns (UpsertArticleResponse);
  rpc GetArticleForAdmin(GetArticleRequest) returns (GetArticleResponse);
  rpc GetOpsStats(GetOpsStatsRequest) returns (GetOpsStatsResponse);
}

message Company {
  string id = 1;
  string slug = 2;
  string name = 3;
  optional string description = 4;
  bool is_active = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message InterviewTemplate {
  string id = 1;
  optional string company_id = 2;
  string slug = 3;
  string title = 4;
  optional string description = 5;
  optional string target_role = 6;
  optional string target_level = 7;
  int32 passing_score = 8;
  bool is_active = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message TemplateSection {
  string id = 1;
  string template_id = 2;
  string section_type = 3;
  string title = 4;
  optional string description = 5;
  int32 position = 6;
  optional int32 passing_score = 7;
  int32 tasks_count = 8;
  repeated string task_ids = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message Task {
  string id = 1;
  string slug = 2;
  string type = 3;
  string title = 4;
  string description = 5;
  string difficulty = 6;
  optional int32 estimated_minutes = 7;
  google.protobuf.Struct metadata = 8;
  string status = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message TaskSolution {
  string id = 1;
  string task_id = 2;
  optional string language = 3;
  string solution_text = 4;
  optional string explanation = 5;
  optional string complexity = 6;
  bool is_primary = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message Rubric {
  string id = 1;
  string task_type = 2;
  string title = 3;
  int32 version = 4;
  bool is_active = 5;
  repeated RubricCriterion criteria = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message RubricCriterion {
  string id = 1;
  string rubric_id = 2;
  string key = 3;
  string title = 4;
  optional string description = 5;
  int32 weight = 6;
  int32 max_score = 7;
  int32 position = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message ListCompaniesRequest {
  bool active_only = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListCompaniesResponse {
  repeated Company companies = 1;
}

message GetCompanyRequest {
  string id = 1;
  string slug = 2;
}

message GetCompanyResponse {
  Company company = 1;
}

message ListInterviewTemplatesRequest {
  optional string company_id = 1;
  bool active_only = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListInterviewTemplatesResponse {
  repeated InterviewTemplate templates = 1;
}

message GetInterviewTemplateDetailRequest {
  string id = 1;
  string slug = 2;
}

message GetInterviewTemplateDetailResponse {
  InterviewTemplate template = 1;
  repeated TemplateSection sections = 2;
}

message ListTasksRequest {
  optional string type = 1;
  optional string difficulty = 2;
  optional string status = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message GetTaskRequest {
  string id = 1;
  string slug = 2;
}

message GetTaskResponse {
  Task task = 1;
}

message GetTaskBundleRequest {
  string task_id = 1;
}

message GetTaskBundleResponse {
  Task task = 1;
  repeated TaskSolution solutions = 2;
  Rubric rubric = 3;
}

message GetRubricRequest {
  string id = 1;
}

message GetRubricResponse {
  Rubric rubric = 1;
}

enum ArticleStatus {
  ARTICLE_STATUS_UNSPECIFIED = 0;
  ARTICLE_STATUS_DRAFT = 1;
  ARTICLE_STATUS_PUBLISHED = 2;
  ARTICLE_STATUS_ARCHIVED = 3;
}

enum ArticleVideoProvider {
  ARTICLE_VIDEO_PROVIDER_UNSPECIFIED = 0;
  ARTICLE_VIDEO_PROVIDER_YOUTUBE = 1;
  ARTICLE_VIDEO_PROVIDER_VIMEO = 2;
  ARTICLE_VIDEO_PROVIDER_OTHER = 3;
}

message ArticleVideo {
  string title = 1;
  string url = 2;
  ArticleVideoProvider provider = 3;
  int32 position = 4;
  optional int32 duration_seconds = 5;
}

message ArticleTaskLink {
  string task_id = 1;
  string slug = 2;
  string title = 3;
  string type = 4;
  string difficulty = 5;
  int32 position = 6;
}

message ArticleSummary {
  string id = 1;
  string slug = 2;
  string title = 3;
  string summary = 4;
  ArticleStatus status = 5;
  optional int32 reading_minutes = 6;
  repeated string skill_keys = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message Article {
  string id = 1;
  string slug = 2;
  string title = 3;
  string summary = 4;
  string body = 5;
  ArticleStatus status = 6;
  optional int32 reading_minutes = 7;
  repeated string skill_keys = 8;
  repeated ArticleVideo videos = 11;
  repeated ArticleTaskLink linked_tasks = 12;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message ListArticlesRequest {
  optional string skill_key = 1;
  int32 limit = 2;
  int32 offset = 3;
  repeated string skill_keys = 4;
  bool include_all_statuses = 5;
  ArticleStatus status = 6;
  optional string query = 7;
}

message ListArticlesResponse {
  repeated ArticleSummary articles = 1;
}

message GetArticleRequest {
  string id = 1;
  string slug = 2;
}

message GetArticleResponse {
  Article article = 1;
  repeated ArticleSummary related_articles = 2;
}

message UpsertCompanyRequest {
  optional string id = 1;
  string slug = 2;
  string name = 3;
  optional string description = 4;
  bool is_active = 5;
}

message UpsertCompanyResponse {
  Company company = 1;
}

message UpsertTaskRequest {
  optional string id = 1;
  string slug = 2;
  string type = 3;
  string title = 4;
  string description = 5;
  string difficulty = 6;
  optional int32 estimated_minutes = 7;
  google.protobuf.Struct metadata = 8;
  string status = 9;
}

message UpsertTaskResponse {
  Task task = 1;
}

message UpsertInterviewTemplateRequest {
  optional string id = 1;
  optional string company_id = 2;
  string slug = 3;
  string title = 4;
  optional string description = 5;
  optional string target_role = 6;
  optional string target_level = 7;
  int32 passing_score = 8;
  bool is_active = 9;
}

message UpsertInterviewTemplateResponse {
  InterviewTemplate template = 1;
}

message UpsertTemplateSectionRequest {
  optional string id = 1;
  string template_id = 2;
  string section_type = 3;
  string title = 4;
  optional string description = 5;
  int32 position = 6;
  optional int32 passing_score = 7;
}

message UpsertTemplateSectionResponse {
  TemplateSection section = 1;
}

message TemplateStructureSection {
  optional string id = 1;
  string section_type = 2;
  string title = 3;
  optional string description = 4;
  int32 position = 5;
  optional int32 passing_score = 6;
  repeated string task_ids = 7;
}

message ReplaceTemplateStructureRequest {
  string template_id = 1;
  repeated TemplateStructureSection sections = 2;
}

message ReplaceTemplateStructureResponse {
  InterviewTemplate template = 1;
  repeated TemplateSection sections = 2;
}

message UpsertArticleRequest {
  optional string id = 1;
  string slug = 2;
  string title = 3;
  string summary = 4;
  string body = 5;
  ArticleStatus status = 6;
  optional int32 reading_minutes = 7;
  repeated string skill_keys = 8;
  repeated ArticleVideo videos = 9;
  repeated string task_slugs = 10;
}

message UpsertArticleResponse {
  Article article = 1;
}

message GetOpsStatsRequest {}

message GetOpsStatsResponse {
  string service_name = 1;
  string database_name = 2;
  int64 database_size_bytes = 3;
  int64 memory_alloc_bytes = 4;
  int64 memory_sys_bytes = 5;
  int32 goroutines = 6;
  double http_rps = 7;
}
