syntax = "proto3";

package sandbox.v1;

option go_package = "github.com/sedorofeevd/project-druzya/services/sandbox/pkg/api/sandbox/v1;sandboxv1";

service SandboxService {
  rpc SubmitRun(SubmitRunRequest) returns (SubmitRunResponse);
  rpc GetRunResult(GetRunResultRequest) returns (GetRunResultResponse);
}

message RunJob {
  string id = 1;
  string language = 2;
}

message SubmitRunRequest {
  string language = 1;
  string source = 2;
}

message SubmitRunResponse {
  RunJob job = 1;
}

message GetRunResultRequest {
  string job_id = 1;
}

message GetRunResultResponse {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
}
